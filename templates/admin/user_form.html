{% extends "admin/base.html" %}

{% block title %}{% if user %}Editar Usuário{% else %}Novo Usuário{% endif %}{% endblock %}

{% block content %}
<div class="admin-card">
    <h2>{% if user %}✏️ Editar Usuário{% else %}➕ Novo Usuário{% endif %}</h2>
    
    <form method="POST" class="mt-4">
        <div class="form-grid-layout">
            <div class="form-group">
                <label>Nome Completo *</label>
                <input type="text" name="name" value="{{ user.name if user else '' }}" required class="form-control">
            </div>
            
            <div class="form-group">
                <label>Usuário (Login) *</label>
                <input type="text" name="username" value="{{ user.username if user else '' }}" required class="form-control">
            </div>
            
            <div class="form-group">
                <label>Senha {% if user %}(deixe em branco para não alterar){% else %}*{% endif %}</label>
                <input type="password" name="password" {% if not user %}required{% endif %} class="form-control">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ user.email if user else '' }}" class="form-control">
            </div>
            
            <div class="form-group">
                <label>Telefone</label>
                <input type="text" name="phone" value="{{ user.phone if user else '' }}" class="form-control">
            </div>
            
            <div class="item-card">
                <label class="mb-3">Permissões de Acesso</label>
                <div class="checkbox-grid">
                    <label class="checkbox-item">
                        <input type="checkbox" name="perm_suppliers" {% if user and user.permissions and user.permissions.suppliers %}checked{% endif %}>
                        <span>🏢 Fornecedores</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="perm_products" {% if user and user.permissions and user.permissions.products %}checked{% endif %}>
                        <span>🛒 Produtos</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="perm_budget_requests" {% if user and user.permissions and user.permissions.budget_requests %}checked{% endif %}>
                        <span>💰 Orçamentos</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="perm_financeiro" {% if user and user.permissions and user.permissions.financeiro %}checked{% endif %}>
                        <span>💵 Financeiro</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="perm_risk_scores" {% if user and user.permissions and user.permissions.risk_scores %}checked{% endif %}>
                        <span>🛡️ Score Risco</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="perm_users" {% if user and user.permissions and user.permissions.users %}checked{% endif %}>
                        <span>👥 Usuários</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="perm_technicians" {% if user and user.permissions and user.permissions.technicians %}checked{% endif %}>
                        <span>🔧 Técnicos</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="perm_settings" {% if user and user.permissions and user.permissions.settings %}checked{% endif %}>
                        <span>⚙️ Configurações</span>
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label class="checkbox-item">
                    <input type="checkbox" name="is_active" {% if not user or user.is_active %}checked{% endif %}>
                    <span>Usuário Ativo</span>
                </label>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Salvar</button>
                <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">❌ Cancelar</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
