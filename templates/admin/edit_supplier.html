{% extends "admin/base.html" %}

{% block title %}Editar Fornecedor{% endblock %}

{% block content %}
<div class="admin-card">
    <h2>✏️ Editar Fornecedor</h2>
    <p>Edite as informações do fornecedor.</p>

    <form method="POST">
        <h3 style="color: #ff8c00; margin-bottom: 1rem;">🏢 Informações do Fornecedor</h3>
        
        <div class="form-group">
            <label for="name">Nome do Fornecedor:</label>
            <input type="text" id="name" name="name" value="{{ supplier.name or '' }}" placeholder="Nome da Empresa" required class="form-control">
        </div>

        <div class="form-group">
            <label for="cnpj">CNPJ:</label>
            <input type="text" id="cnpj" name="cnpj" value="{{ supplier.cnpj or '' }}" placeholder="12.345.678/0001-90" class="form-control">
        </div>

        <div class="form-group">
            <label for="phone">Telefone:</label>
            <input type="text" id="phone" name="phone" value="{{ supplier.phone or '' }}" placeholder="(11) 99999-9999" class="form-control">
        </div>

        <div class="form-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" value="{{ supplier.email or '' }}" placeholder="fornecedor@email.com" class="form-control">
        </div>

        <div class="form-group">
            <label for="website">Site:</label>
            <input type="url" id="website" name="website" value="{{ supplier.website or '' }}" placeholder="https://www.site.com.br" class="form-control">
        </div>

        <div class="form-group">
            <label for="address">Endereço:</label>
            <input type="text" id="address" name="address" value="{{ supplier.address or '' }}" placeholder="Rua, número, bairro, cidade" class="form-control">
        </div>

        <div class="form-group">
            <label for="description">Descrição:</label>
            <textarea id="description" name="description" placeholder="Informações adicionais sobre o fornecedor..." class="form-control" style="resize: vertical;">{{ supplier.description or '' }}</textarea>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">💾 Salvar Alterações</button>
            <a href="{{ url_for('admin_suppliers') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
