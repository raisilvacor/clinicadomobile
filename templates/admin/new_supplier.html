{% extends "admin/base.html" %}

{% block title %}Novo Fornecedor{% endblock %}

{% block content %}
<div class="admin-card">
    <h2>➕ Novo Fornecedor</h2>
    <p>Cadastre um novo fornecedor no sistema.</p>

    <form method="POST">
        <h3 style="color: #ff8c00; margin-bottom: 1rem;">🏢 Informações do Fornecedor</h3>
        
        <div class="form-group">
            <label for="name">Nome do Fornecedor:</label>
            <input type="text" id="name" name="name" placeholder="Nome da Empresa" required class="form-control">
        </div>

        <div class="form-group">
            <label for="cnpj">CNPJ:</label>
            <input type="text" id="cnpj" name="cnpj" placeholder="12.345.678/0001-90" class="form-control">
        </div>

        <div class="form-group">
            <label for="phone">Telefone:</label>
            <input type="text" id="phone" name="phone" placeholder="(11) 99999-9999" class="form-control">
        </div>

        <div class="form-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="fornecedor@email.com" class="form-control">
        </div>

        <div class="form-group">
            <label for="address">Endereço:</label>
            <input type="text" id="address" name="address" placeholder="Rua, número, bairro, cidade" class="form-control">
        </div>

        <div class="form-group">
            <label for="description">Descrição:</label>
            <textarea id="description" name="description" placeholder="Informações adicionais sobre o fornecedor..." class="form-control" style="resize: vertical;"></textarea>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">💾 Criar Fornecedor</button>
            <a href="{{ url_for('admin_suppliers') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
