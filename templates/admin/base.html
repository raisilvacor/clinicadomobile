<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Painel Administrativo{% endblock %} - TechCell</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2Lw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
        }

        .admin-header {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            padding: 1.5rem 0;
            border-bottom: 2px solid #ff8c00;
            box-shadow: 0 4px 20px rgba(255, 140, 0, 0.2);
        }

        .admin-nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-logo {
            display: flex;
            align-items: center;
            height: 50px;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        
        .admin-logo:hover {
            opacity: 0.8;
        }
        
        .admin-logo img {
            height: 100%;
            max-height: 50px;
            width: auto;
            object-fit: contain;
        }

        .admin-nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .admin-nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }

        .admin-nav-links a:hover,
        .admin-nav-links a.active {
            color: #ff8c00;
            background: rgba(255, 140, 0, 0.1);
        }

        /* Menu Hambúrguer */
        .admin-menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
        }

        .admin-menu-toggle span {
            width: 25px;
            height: 3px;
            background: #ff8c00;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .admin-menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        .admin-menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .admin-menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        .admin-menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }

        .admin-menu-overlay.active {
            display: block;
        }

        @media (max-width: 1024px) {
            .admin-menu-toggle {
                display: flex;
            }

            .admin-nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 70%;
                max-width: 350px;
                height: 100vh;
                background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
                flex-direction: column;
                gap: 0;
                padding: 5rem 2rem 2rem;
                transition: right 0.3s ease;
                box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
                z-index: 1000;
                overflow-y: auto;
            }

            .admin-nav-links.active {
                right: 0;
            }

            .admin-nav-links li {
                width: 100%;
                border-bottom: 1px solid rgba(255, 140, 0, 0.2);
            }

            .admin-nav-links a {
                display: block;
                padding: 1rem 0;
                font-size: 1rem;
                width: 100%;
            }

            .admin-nav-links a:hover,
            .admin-nav-links a.active {
                padding-left: 1rem;
            }
        }

        /* Estilos Globais do Admin */
        .admin-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            min-height: 80vh;
        }

        .admin-card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.95rem;
            font-weight: bold;
            text-align: center;
        }

        .btn-primary {
            background: #ff8c00;
            color: #000;
        }

        .btn-primary:hover {
            background: #e67e00;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 140, 0, 0.3);
        }

        .btn-secondary {
            background: #333;
            color: #fff;
            border: 1px solid #555;
        }

        .btn-secondary:hover {
            background: #444;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 5px;
            color: #fff;
            margin-bottom: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: #ff8c00;
        }

        .form-control[readonly],
        .form-control:disabled {
            background-color: #333;
            color: #888;
            cursor: not-allowed;
            border-color: #444;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ff8c00;
            font-weight: bold;
        }

        .items-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .item-card {
            background: #0d0d0d;
            padding: 1.5rem;
            border-radius: 10px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .item-card:hover {
            border-color: #ff8c00;
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.1);
        }

        .item-card h3 {
            color: #fff;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
        }

        .status-badge.active {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .status-badge.inactive {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        .status-badge.pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .status-badge.info { background: rgba(0, 123, 255, 0.2); color: #00bfff; border: 1px solid #00bfff; }
        .status-badge.orange { background: rgba(255, 140, 0, 0.2); color: #ff8c00; border: 1px solid #ff8c00; }
        .status-badge.teal { background: rgba(23, 162, 184, 0.2); color: #17a2b8; border: 1px solid #17a2b8; }
        .status-badge.primary { background: rgba(0, 123, 255, 0.2); color: #007bff; border: 1px solid #007bff; }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .admin-table-container {
            overflow-x: auto;
            margin-top: 1rem;
            background: #0d0d0d;
            border-radius: 10px;
            border: 1px solid #333;
        }
        
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .admin-table th {
            background: #ff8c00;
            color: #000000;
            padding: 1rem;
            text-align: left;
            font-weight: bold;
        }
        
        .admin-table td {
            padding: 1rem;
            border-bottom: 1px solid #333333;
            color: #ffffff;
        }
        
        .admin-table tr:last-child td {
            border-bottom: none;
        }

        .admin-table tr:hover {
            background: rgba(255, 140, 0, 0.1);
        }

        .search-box {
            background: #0d0d0d;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #333;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            padding: 0.75rem;
            background: #1a1a1a;
            border: 1px solid #ff8c00;
            border-radius: 5px;
            color: #fff;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.3);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ffffff;
            cursor: pointer;
            margin-bottom: 0;
        }

        .badge-overlay {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #dc3545;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 10;
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
            background: #0d0d0d;
        }

        .product-image-placeholder {
            width: 100%;
            height: 200px;
            border-radius: 10px;
            margin-bottom: 1rem;
            background: #0d0d0d;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
        }

        .info-box {
            background: rgba(255, 140, 0, 0.1);
            border: 1px solid rgba(255, 140, 0, 0.3);
            border-radius: 5px;
            padding: 1rem;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #ccc;
        }
        
        .info-box strong {
            color: #ff8c00;
        }

        .item-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        /* New Global Classes for Card Layouts */
        .card-content-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-main-content {
            flex: 1;
        }

        .card-title-clean {
            color: #ff8c00;
            margin: 0 0 0.5rem 0 !important;
            border-bottom: none !important;
            font-size: 1.1rem;
        }

        .text-value {
            color: #ffffff !important;
            margin: 0.25rem 0 !important;
        }

        .specialties-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #333;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* Form Layout Helpers */
        .form-grid-layout {
            display: grid;
            gap: 1.5rem;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .help-text {
            color: #999;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
        
        /* Utility */
        .w-100 { width: 100%; }
        .mt-0 { margin-top: 0 !important; }
        .mb-0 { margin-bottom: 0 !important; }
        .mt-1 { margin-top: 0.25rem !important; }
        .mb-1 { margin-bottom: 0.25rem !important; }
        .mt-2 { margin-top: 0.5rem !important; }
        .mb-2 { margin-bottom: 0.5rem !important; }
        .mt-3 { margin-top: 1rem !important; }
        .mb-3 { margin-bottom: 1rem !important; }
        .mt-4 { margin-top: 1.5rem !important; }
        .mb-4 { margin-bottom: 1.5rem !important; }
        .mt-5 { margin-top: 3rem !important; }
        .mb-5 { margin-bottom: 3rem !important; }



        /* Dashboard & Stats */
        .admin-dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ff8c00;
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.2);
        }

        .stat-card h3 {
            color: #ff8c00;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-card p {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
            line-height: 1.5;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff8c00;
            margin: 0.5rem 0;
        }
        
        .metric-label {
            color: #cccccc;
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        .text-success { color: #28a745 !important; }
        .text-danger { color: #dc3545 !important; }
        .text-warning { color: #ffc107 !important; }
        .text-critical { color: #dc3545 !important; }

        .bg-success-light { background: rgba(40, 167, 69, 0.1); border-color: #28a745; }
        .bg-danger-light { background: rgba(220, 53, 69, 0.1); border-color: #dc3545; }

        /* Filter Container */
        .filter-container {
            background: rgba(255, 140, 0, 0.05);
            border: 2px solid #ff8c00;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .filter-container form {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Progress Bar */
        .progress-bar-container {
            background: #333;
            height: 15px;
            border-radius: 10px;
            overflow: hidden;
            margin: 0.5rem 0;
        }
        
        .progress-bar-fill {
            background: linear-gradient(90deg, #ff8c00, #ff0000);
            height: 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 1s ease-in-out;
        }

        /* Modal */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.8); 
        }

        .modal-content {
            background-color: #1a1a1a;
            margin: 10% auto; 
            padding: 2rem;
            border: 2px solid #ff8c00;
            width: 80%; 
            max-width: 500px;
            border-radius: 15px;
            color: white;
            position: relative;
        }

        .close-modal {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            right: 1.5rem;
            top: 1rem;
        }

        .close-modal:hover {
            color: #ff8c00;
        }

        /* Alert Card */
        .alert-card {
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 2px solid transparent;
        }
        
        .alert-card.critical {
            background: linear-gradient(135deg, rgba(220, 53, 69, 0.2) 0%, rgba(220, 53, 69, 0.1) 100%);
            border-color: #dc3545;
        }
        
        .alert-card.warning {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.2) 0%, rgba(255, 193, 7, 0.1) 100%);
            border-color: #ffc107;
        }

        /* File Upload */
        .file-upload-area {
            border: 2px dashed #ff8c00;
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            background: rgba(255, 140, 0, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .file-upload-area:hover {
            background: rgba(255, 140, 0, 0.1);
            border-color: #ff6b00;
        }

        .file-upload-area.has-photo {
            border-color: #28a745;
            background: rgba(40, 167, 69, 0.1);
        }

        .photo-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            margin-top: 1rem;
            display: none;
        }

        .photo-preview.show {
            display: block;
        }

        /* Utility Text Colors */
        .text-white { color: #ffffff !important; }
        .text-muted { color: #999999 !important; }
        .text-success { color: #28a745 !important; }
        .text-danger { color: #dc3545 !important; }
        .text-warning { color: #ffc107 !important; }
        .text-orange { color: #ff8c00 !important; }
        
        /* Border Utility */
        .border-success { border-color: #28a745 !important; }
        .border-danger { border-color: #dc3545 !important; }
        .border-warning { border-color: #ffc107 !important; }
        .border-orange { border-color: #ff8c00 !important; }

        /* Risk Score Backgrounds */
        .bg-risk-high { background: rgba(220, 53, 69, 0.2); border: 2px solid #dc3545; }
        .bg-risk-medium { background: rgba(255, 193, 7, 0.2); border: 2px solid #ffc107; }
        .bg-risk-low { background: rgba(40, 167, 69, 0.2); border: 2px solid #28a745; }

        /* Section Title */
        .section-title {
            color: #ff8c00;
            margin-bottom: 1rem;
            margin-top: 2rem;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }
        
        .admin-layout {
            display: flex;
            min-height: 100vh;
            background: #0d0d0d;
        }
        
        .admin-sidebar {
            width: 260px;
            background: #111;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        
        .admin-sidebar .admin-logo {
            display: block;
            padding: 1rem;
            border-bottom: 1px solid #333;
            text-align: center;
        }
        
        .admin-sidebar .admin-logo {
            overflow: hidden;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
        }
        .admin-sidebar .admin-logo img {
            display: block;
            max-width: 100%;
            height: auto;
            max-height: 96px;
            margin: 0 auto;
            object-fit: contain;
        }
        
        .admin-menu {
            list-style: none;
            margin: 0;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            overflow-y: auto;
        }
        
        .admin-menu li a {
            display: block;
            padding: 0.65rem 0.9rem;
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            border: 1px solid transparent;
        }
        
        .admin-menu li a:hover {
            background: #1a1a1a;
            border-color: #333;
        }
        
        .admin-menu li a.active {
            background: rgba(255, 140, 0, 0.12);
            border-color: #ff8c00;
            color: #ff8c00;
        }
        
        .admin-container {
            flex: 1;
            padding: 2rem;
        }
        
        @media (max-width: 900px) {
            .admin-sidebar {
                width: 220px;
            }
            .admin-container {
                padding: 1rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <a href="{{ url_for('admin_dashboard') }}" class="admin-logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo Clínica CELL">
            </a>
            <ul class="admin-menu">
                <li><a href="{{ url_for('admin_dashboard') }}" class="{% if request.endpoint == 'admin_dashboard' %}active{% endif %}">Dashboard</a></li>
                <li><a href="{{ url_for('admin_hero') }}" class="{% if request.endpoint == 'admin_hero' %}active{% endif %}">Hero</a></li>
                <li><a href="{{ url_for('admin_services') }}" class="{% if request.endpoint == 'admin_services' %}active{% endif %}">Serviços</a></li>
                <li><a href="{{ url_for('admin_about') }}" class="{% if request.endpoint == 'admin_about' %}active{% endif %}">Sobre</a></li>
                <li><a href="{{ url_for('admin_devices') }}" class="{% if request.endpoint == 'admin_devices' %}active{% endif %}">Dispositivos</a></li>
                <li><a href="{{ url_for('admin_laboratory') }}" class="{% if request.endpoint == 'admin_laboratory' %}active{% endif %}">Laboratório</a></li>
                <li><a href="{{ url_for('admin_contact') }}" class="{% if request.endpoint == 'admin_contact' %}active{% endif %}">Contato</a></li>
                <li><a href="{{ url_for('admin_budget_requests') }}" class="{% if request.endpoint == 'admin_budget_requests' %}active{% endif %}">Orçamentos</a></li>
                <li><a href="{{ url_for('admin_password') }}">Senha</a></li>
                <li><a href="{{ url_for('admin_logout') }}">Sair</a></li>
            </ul>
        </aside>
        <div class="admin-container">
            {% block content %}{% endblock %}
        </div>
    </div>

    {% block extra_js %}{% endblock %}
    <script></script>
</body>
</html>
