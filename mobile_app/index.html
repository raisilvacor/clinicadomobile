<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ff8c00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Clínica CELL">
    <title>Clínica CELL</title>
    <link rel="manifest" href="/mobile_app/manifest.json">
    <link rel="icon" type="image/png" href="/mobile_app/icon-192.png">
    <link rel="apple-touch-icon" href="/mobile_app/icon-192.png">
    
    <!-- Meta tags para PWA -->
    <meta name="application-name" content="Clínica CELL">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-TileColor" content="#ff8c00">
    <meta name="msapplication-TileImage" content="/mobile_app/icon-192.png">
    
    <!-- Registrar Service Worker imediatamente para PWA Builder detectar -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/mobile_app/service-worker.js', {
                    scope: '/mobile_app/'
                }).then((registration) => {
                    console.log('Service Worker registrado:', registration);
                }).catch((error) => {
                    console.error('Erro ao registrar Service Worker:', error);
                });
            });
        }
    </script>
    <link rel="apple-touch-icon" href="/mobile_app/icon-192.png">
    
    <!-- Registrar Service Worker imediatamente -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/mobile_app/service-worker.js', {
                    scope: '/mobile_app/'
                }).then((registration) => {
                    console.log('Service Worker registrado:', registration);
                }).catch((error) => {
                    console.error('Erro ao registrar Service Worker:', error);
                });
            });
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .logo img {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            margin-bottom: 1rem;
            object-fit: contain;
            background: #ffffff;
            padding: 10px;
        }
        
        .logo h1 {
            color: #ff8c00;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .logo p {
            color: #999;
            font-size: 0.9rem;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .btn {
            padding: 1.2rem 2rem;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            display: block;
            background: linear-gradient(135deg, #ff8c00 0%, #ff6b00 100%);
            color: #000000;
            box-shadow: 0 5px 20px rgba(255, 140, 0, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #333333 0%, #1a1a1a 100%);
            color: #ffffff;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        
        .form-container {
            background: #0d0d0d;
            padding: 2rem;
            border-radius: 15px;
            border: 2px solid #333333;
            margin-top: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            color: #ff8c00;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 10px;
            color: #ffffff;
            font-size: 1rem;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff8c00;
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .error-message {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #dc3545;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        
        .success-message {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #28a745;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        
        .back-btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #333333;
            color: #ffffff;
            border-radius: 10px;
            text-decoration: none;
            margin-bottom: 1rem;
        }
        
        .repair-card {
            background: #0d0d0d;
            padding: 1.5rem;
            border-radius: 15px;
            border: 2px solid #333333;
            margin-bottom: 1rem;
        }
        
        .repair-card h3 {
            color: #ff8c00;
            margin-bottom: 0.5rem;
        }
        
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }
        
        .status-aguardando {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }
        
        .status-em-andamento {
            background: rgba(0, 123, 255, 0.2);
            color: #007bff;
            border: 1px solid #007bff;
        }
        
        .status-concluido {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }
        
        .hidden {
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: #999;
        }
        
    </style>
</head>
<body>
    <!-- Tela Inicial -->
    <div id="homeScreen" class="container">
        <div class="logo">
            <img src="/mobile_app/icon-192.png" alt="Clínica CELL">
            <h1>Clínica CELL</h1>
            <p>Assistência Técnica Profissional</p>
        </div>
        
        <div class="button-group">
            <button class="btn" onclick="showLogin()">🔐 Entrar</button>
            <button class="btn btn-secondary" onclick="showFirstAccess()">🆕 Primeiro Acesso</button>

        </div>
    </div>
    
    <!-- Tela de Login -->
    <div id="loginScreen" class="container hidden">
        <div class="form-container">
            <a href="#" class="back-btn" onclick="showHome()">← Voltar</a>
            <h2 style="color: #ff8c00; margin-bottom: 1.5rem;">Entrar</h2>
            <div id="loginError" class="error-message hidden"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>CPF (apenas números)</label>
                    <input type="text" id="loginCpf" maxlength="11" pattern="[0-9]{11}" required placeholder="12345678901">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn">Entrar</button>
            </form>
        </div>
    </div>
    
    <!-- Tela de Primeiro Acesso -->
    <div id="firstAccessScreen" class="container hidden">
        <div class="form-container">
            <a href="#" class="back-btn" onclick="showHome()">← Voltar</a>
            <h2 style="color: #ff8c00; margin-bottom: 1.5rem;">Primeiro Acesso</h2>
            <div id="firstAccessError" class="error-message hidden"></div>
            <div id="firstAccessSuccess" class="success-message hidden"></div>
            <form id="firstAccessForm" onsubmit="handleFirstAccess(event)">
                <div class="form-group">
                    <label>CPF (apenas números)</label>
                    <input type="text" id="firstAccessCpf" maxlength="11" pattern="[0-9]{11}" required placeholder="12345678901">
                    <small style="color: #999; display: block; margin-top: 0.5rem;">Digite seu CPF para verificar se há serviços cadastrados</small>
                </div>
                <button type="button" class="btn btn-secondary" onclick="checkCpf()">Verificar CPF</button>
                <div id="createPasswordSection" class="hidden" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label>Nova Senha (mínimo 6 caracteres)</label>
                        <input type="password" id="newPassword" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label>Confirmar Senha</label>
                        <input type="password" id="confirmPassword" minlength="6" required>
                    </div>
                    <button type="submit" class="btn">Criar Senha</button>
                </div>
            </form>
        </div>
    </div>
    

    
    <!-- Tela de Reparos (após login) -->
    <div id="repairsScreen" class="container hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2 style="color: #ff8c00;">Meus Reparos</h2>
            <button class="btn btn-secondary" onclick="logout()" style="padding: 0.75rem 1.5rem; font-size: 0.9rem;">Sair</button>
        </div>
        <div id="repairsList">
            <div class="loading">Carregando...</div>
        </div>
    </div>
    
    <!-- Tela de Detalhes do Reparo -->
    <div id="repairDetailsScreen" class="container hidden">
        <div id="repairDetailsContent">
            <div class="loading">Carregando...</div>
        </div>
    </div>
    
    
    <script>
        const API_BASE = window.location.origin; // Usar o mesmo servidor
        
        // Navegação entre telas
        function showScreen(screenId) {
            document.querySelectorAll('[id$="Screen"]').forEach(screen => {
                screen.classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }
        
        function showHome() {
            showScreen('homeScreen');
        }
        
        function showLogin() {
            showScreen('loginScreen');
            document.getElementById('loginError').classList.add('hidden');
        }
        
        function showFirstAccess() {
            showScreen('firstAccessScreen');
            document.getElementById('firstAccessError').classList.add('hidden');
            document.getElementById('firstAccessSuccess').classList.add('hidden');
            document.getElementById('createPasswordSection').classList.add('hidden');
        }
        

        
        // Verificar CPF no primeiro acesso
        async function checkCpf() {
            const cpf = document.getElementById('firstAccessCpf').value.replace(/\D/g, '');
            if (cpf.length !== 11) {
                showError('firstAccessError', 'CPF deve ter 11 dígitos');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/check-cpf`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cpf})
                });
                
                const data = await response.json();
                
                if (data.success && data.has_service) {
                    if (data.has_password) {
                        showError('firstAccessError', 'Você já possui senha cadastrada. Use "Entrar" para fazer login.');
                    } else {
                        document.getElementById('createPasswordSection').classList.remove('hidden');
                        showSuccess('firstAccessSuccess', 'CPF verificado! Agora crie sua senha.');
                    }
                } else {
                    showError('firstAccessError', 'Nenhum serviço encontrado para este CPF. Entre em contato conosco.');
                }
            } catch (error) {
                showError('firstAccessError', 'Erro ao verificar CPF. Tente novamente.');
            }
        }
        
        // Criar senha
        async function handleFirstAccess(event) {
            event.preventDefault();
            const cpf = document.getElementById('firstAccessCpf').value.replace(/\D/g, '');
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showError('firstAccessError', 'As senhas não coincidem');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/create-password`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cpf, password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('firstAccessSuccess', 'Senha criada com sucesso! Agora você pode fazer login.');
                    setTimeout(() => {
                        showLogin();
                        document.getElementById('loginCpf').value = cpf;
                    }, 2000);
                } else {
                    showError('firstAccessError', data.error || 'Erro ao criar senha');
                }
            } catch (error) {
                showError('firstAccessError', 'Erro ao criar senha. Tente novamente.');
            }
        }
        
        // Login
        async function handleLogin(event) {
            event.preventDefault();
            const cpf = document.getElementById('loginCpf').value.replace(/\D/g, '');
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cpf, password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('userToken', data.token);
                    localStorage.setItem('userCpf', cpf);
                    await handleLoginSuccess(cpf);
                    loadRepairs();
                } else {
                    showError('loginError', data.error || 'Erro ao fazer login');
                }
            } catch (error) {
                showError('loginError', 'Erro ao fazer login. Tente novamente.');
            }
        }
        
        // Carregar reparos
        async function loadRepairs() {
            const cpf = localStorage.getItem('userCpf');
            if (!cpf) {
                showHome();
                return;
            }
            
            showScreen('repairsScreen');
            document.getElementById('repairsList').innerHTML = '<div class="loading">Carregando...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/my-repairs`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cpf})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayRepairs(data.repairs);
                } else {
                    document.getElementById('repairsList').innerHTML = `<div class="error-message">${data.error || 'Erro ao carregar reparos'}</div>`;
                }
            } catch (error) {
                document.getElementById('repairsList').innerHTML = '<div class="error-message">Erro ao carregar reparos. Tente novamente.</div>';
            }
        }
        
        // Exibir reparos
        function displayRepairs(repairs) {
            const container = document.getElementById('repairsList');
            
            if (repairs.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: #999;">Nenhum reparo encontrado.</div>';
                return;
            }
            
            container.innerHTML = repairs.map(repair => `
                <div class="repair-card" onclick="viewRepairDetails('${repair.id}')" style="cursor: pointer;">
                    <h3>${repair.device_name || 'N/A'} - ${repair.device_model || 'N/A'}</h3>
                    <p style="color: #999; margin: 0.5rem 0;">ID: ${repair.id}</p>
                    <p style="margin: 0.5rem 0;">${repair.problem_description || ''}</p>
                    <span class="status-badge status-${repair.status}">${getStatusLabel(repair.status)}</span>
                    ${repair.has_order ? '<p style="color: #28a745; margin-top: 0.5rem;">✓ Ordem de Retirada emitida</p>' : ''}
                    ${repair.budget ? `<p style="color: #ff8c00; margin-top: 0.5rem;">💰 Orçamento: R$ ${repair.budget}</p>` : ''}
                    <p style="color: #ff8c00; margin-top: 1rem; font-weight: bold;">👉 Toque para ver detalhes</p>
                </div>
            `).join('');
        }
        
        // Ver detalhes do reparo
        async function viewRepairDetails(repairId) {
            const cpf = localStorage.getItem('userCpf');
            if (!cpf) {
                showHome();
                return;
            }
            
            showScreen('repairDetailsScreen');
            document.getElementById('repairDetailsContent').innerHTML = '<div class="loading">Carregando...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/repair/${repairId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cpf})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayRepairDetails(data.repair, data.order, data.checklists);
                    // Iniciar polling para atualização em tempo real
                    startRepairPolling(repairId);
                } else {
                    document.getElementById('repairDetailsContent').innerHTML = `<div class="error-message">${data.error || 'Erro ao carregar reparo'}</div>`;
                }
            } catch (error) {
                document.getElementById('repairDetailsContent').innerHTML = '<div class="error-message">Erro ao carregar reparo. Tente novamente.</div>';
            }
        }
        
        // Exibir detalhes completos do reparo
        function displayRepairDetails(repair, order, checklists) {
            const container = document.getElementById('repairDetailsContent');
            
            const statusLabels = {
                'aguardando': '⏳ Aguardando',
                'em_analise': '🔍 Em Análise',
                'orcamento': '💰 Orçamento',
                'aprovado': '✅ Aprovado',
                'em_reparo': '🔧 Em Reparo',
                'concluido': '🎉 Concluído'
            };
            
            let html = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <button class="back-btn" onclick="loadRepairs()">← Voltar</button>
                    <button class="btn btn-secondary" onclick="refreshRepairDetails('${repair.id}')" style="padding: 0.75rem 1.5rem; font-size: 0.9rem;">🔄 Atualizar</button>
                </div>
                
                <div class="repair-card" style="margin-bottom: 1rem;">
                    <div style="text-align: center; margin-bottom: 1.5rem;">
                        <span class="status-badge status-${repair.status}" style="font-size: 1.1rem; padding: 1rem 2rem;">
                            ${statusLabels[repair.status] || repair.status}
                        </span>
                    </div>
                    
                    <h3 style="color: #ff8c00; margin-bottom: 1rem;">📱 Informações do Dispositivo</h3>
                    <div style="display: grid; gap: 0.75rem; margin-bottom: 1rem;">
                        <div><strong style="color: #ff8c00;">Dispositivo:</strong> <span style="color: #fff;">${repair.device_name || 'N/A'}</span></div>
                        <div><strong style="color: #ff8c00;">Modelo:</strong> <span style="color: #fff;">${repair.device_model || 'N/A'}</span></div>
                        <div><strong style="color: #ff8c00;">IMEI:</strong> <span style="color: #fff;">${repair.device_imei || 'N/A'}</span></div>
                        <div><strong style="color: #ff8c00;">ID do Reparo:</strong> <span style="color: #ff8c00; font-family: monospace;">${repair.id}</span></div>
                        <div><strong style="color: #ff8c00;">Data de Entrada:</strong> <span style="color: #fff;">${repair.created_at ? repair.created_at.substring(0, 10) : 'N/A'}</span></div>
                    </div>
                    
                    ${repair.problem_description ? `
                        <div style="margin-top: 1rem; padding: 1rem; background: #0d0d0d; border-radius: 10px;">
                            <strong style="color: #ff8c00;">Descrição do Problema:</strong>
                            <p style="color: #fff; margin-top: 0.5rem; line-height: 1.6;">${repair.problem_description}</p>
                        </div>
                    ` : ''}
                </div>
                
                ${repair.budget ? `
                    <div class="repair-card" style="background: rgba(255, 140, 0, 0.1); border-color: #ff8c00;">
                        <h3 style="color: #ff8c00; margin-bottom: 1rem;">💰 Orçamento</h3>
                        <div style="text-align: center;">
                            <div style="font-size: 2.5rem; color: #ff8c00; font-weight: bold; margin: 1rem 0;">
                                R$ ${typeof repair.budget === 'object' ? repair.budget.amount || repair.budget : repair.budget}
                            </div>
                            ${typeof repair.budget === 'object' && repair.budget.description ? `
                                <p style="color: #ccc; margin: 1rem 0;">${repair.budget.description}</p>
                            ` : ''}
                            ${typeof repair.budget === 'object' && repair.budget.status === 'pending' ? `
                                <div style="margin-top: 1.5rem;">
                                    <button class="btn" onclick="approveBudget('${repair.id}')" style="background: #28a745; margin-right: 0.5rem;">✅ Aprovar</button>
                                    <button class="btn btn-secondary" onclick="rejectBudget('${repair.id}')" style="background: #dc3545;">❌ Rejeitar</button>
                                </div>
                            ` : ''}
                            ${typeof repair.budget === 'object' && repair.budget.status === 'approved' ? `
                                <p style="color: #28a745; margin-top: 1rem; font-weight: bold;">✅ Orçamento Aprovado</p>
                            ` : ''}
                        </div>
                    </div>
                ` : ''}
                
                ${order ? `
                    <div class="repair-card" style="background: rgba(40, 167, 69, 0.1); border-color: #28a745;">
                        <h3 style="color: #28a745; margin-bottom: 1rem;">📋 Ordem de Retirada (OR)</h3>
                        <p style="color: #fff; margin-bottom: 1rem;"><strong>ID da OR:</strong> ${order.id}</p>
                        <button class="btn" onclick="downloadPDF('${repair.id}', 'or')" style="background: #28a745; width: 100%;">
                            📥 Baixar PDF da OR
                        </button>
                    </div>
                ` : ''}
                
                <div class="repair-card">
                    <h3 style="color: #ff8c00; margin-bottom: 1rem;">📥 Downloads</h3>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <button class="btn btn-secondary" onclick="downloadPDF('${repair.id}', 'repair')" style="width: 100%;">
                            📄 Baixar PDF do Reparo
                        </button>
                    </div>
                </div>
            `;
            
            // Mensagens
            if (repair.messages && repair.messages.length > 0) {
                html += `
                    <div class="repair-card">
                        <h3 style="color: #ff8c00; margin-bottom: 1rem;">💬 Mensagens</h3>
                        <div id="messagesList" style="max-height: 400px; overflow-y: auto; margin-bottom: 1rem;">
                            ${repair.messages.map(msg => `
                                <div style="background: #0d0d0d; padding: 1rem; border-radius: 10px; margin-bottom: 0.75rem; border-left: 4px solid #ff8c00;">
                                    <div style="color: #999; font-size: 0.85rem; margin-bottom: 0.5rem;">
                                        ${msg.sent_at ? msg.sent_at.substring(0, 16) : 'N/A'}
                                    </div>
                                    <div style="color: #fff; line-height: 1.6;">${msg.content || ''}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="newMessage" placeholder="Digite sua mensagem..." style="flex: 1; padding: 0.75rem; background: #1a1a1a; border: 2px solid #333333; border-radius: 10px; color: #fff;">
                            <button class="btn" onclick="sendMessage('${repair.id}')" style="padding: 0.75rem 1.5rem;">Enviar</button>
                        </div>
                    </div>
                `;
            } else {
                html += `
                    <div class="repair-card">
                        <h3 style="color: #ff8c00; margin-bottom: 1rem;">💬 Mensagens</h3>
                        <p style="color: #999; margin-bottom: 1rem;">Nenhuma mensagem ainda.</p>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="newMessage" placeholder="Digite sua mensagem..." style="flex: 1; padding: 0.75rem; background: #1a1a1a; border: 2px solid #333333; border-radius: 10px; color: #fff;">
                            <button class="btn" onclick="sendMessage('${repair.id}')" style="padding: 0.75rem 1.5rem;">Enviar</button>
                        </div>
                    </div>
                `;
            }
            
            // Checklists
            if (checklists && checklists.length > 0) {
                html += `
                    <div class="repair-card">
                        <h3 style="color: #ff8c00; margin-bottom: 1rem;">🛡️ Checklists Antifraude</h3>
                        ${checklists.map(checklist => {
                            const hasSignature = checklist.signature && checklist.signature.trim() !== '';
                            return `
                            <div style="background: #0d0d0d; padding: 1rem; border-radius: 10px; margin-bottom: 0.75rem; border: 1px solid #333333;">
                                <h4 style="color: #ff8c00; margin-bottom: 0.5rem;">
                                    ${checklist.type === 'inicial' ? '📥 Checklist Antifraude Inicial' : '✅ Checklist Antifraude de Conclusão'}
                                </h4>
                                <p style="color: #999; font-size: 0.85rem; margin-bottom: 0.5rem;">ID: ${checklist.id}</p>
                                <p style="color: #999; font-size: 0.85rem; margin-bottom: 0.5rem;">Data: ${checklist.timestamp ? checklist.timestamp.substring(0, 16) : 'N/A'}</p>
                                ${hasSignature ? `
                                    <div style="margin-top: 1rem; background: rgba(40, 167, 69, 0.1); border: 2px solid #28a745; border-radius: 10px; padding: 1rem;">
                                        <h4 style="color: #28a745; margin-bottom: 0.5rem; font-size: 1rem;">✍️ Assinatura Digital</h4>
                                        <p style="color: #999; font-size: 0.85rem; margin-bottom: 0.5rem;">
                                            Assinado em: ${checklist.signature_signed_at ? checklist.signature_signed_at.substring(0, 16) : (checklist.timestamp ? checklist.timestamp.substring(0, 16) : 'N/A')}
                                        </p>
                                        <img src="${checklist.signature}" alt="Assinatura" style="max-width: 100%; border: 2px solid #28a745; border-radius: 10px; padding: 0.5rem; background: #ffffff;" onerror="this.style.display='none';">
                                    </div>
                                ` : `
                                    <div style="margin-top: 1rem; padding-top: 1rem; border-top: 2px solid #333333;">
                                        <h4 style="color: #ff8c00; margin-bottom: 0.5rem; font-size: 1rem;">✍️ Assinatura Digital</h4>
                                        <p style="color: #999; margin-bottom: 1rem; font-size: 0.9rem;">
                                            Por favor, assine digitalmente o checklist para confirmar as informações do seu aparelho.
                                        </p>
                                        <canvas id="checklist-signature-canvas-${checklist.id}" style="width: 100%; height: 200px; border: 2px solid #333333; border-radius: 10px; background: #ffffff; cursor: crosshair; touch-action: none; margin-bottom: 0.75rem;"></canvas>
                                        <input type="hidden" id="checklist-signature-data-${checklist.id}">
                                        <div style="display: flex; gap: 0.5rem;">
                                            <button class="btn btn-secondary" onclick="clearChecklistSignature('${checklist.id}')" style="flex: 1; background: #6c757d;">🗑️ Limpar</button>
                                            <button class="btn" onclick="saveChecklistSignature('${repair.id}', '${checklist.id}', this)" style="flex: 1; background: #28a745;">✅ Confirmar Assinatura</button>
                                        </div>
                                    </div>
                                `}
                            </div>
                        `;
                        }).join('')}
                    </div>
                `;
            }
            
            // Cláusulas Contratuais (antes da assinatura)
            if (repair.budget && typeof repair.budget === 'object' && repair.budget.status === 'approved' && !(repair.signature && repair.signature.image)) {
                html += `
                    <div class="repair-card" style="background: rgba(255, 140, 0, 0.05); border: 2px solid #ff8c00; border-radius: 15px; padding: 1.5rem; margin: 1rem 0;">
                        <h3 style="color: #ff8c00; margin-bottom: 1.5rem; text-align: center;">📋 CLÁUSULAS CONTRATUAIS</h3>
                        <div style="max-height: 400px; overflow-y: auto; padding: 1rem; background: rgba(0, 0, 0, 0.3); border-radius: 10px; margin-bottom: 1.5rem;">
                            <div style="color: #ffffff; font-size: 0.9rem; line-height: 1.6;">
                                <h4 style="color: #ff8c00; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 1rem;">1. DO SINAL E CONDIÇÕES DE PAGAMENTO</h4>
                                <p style="margin-bottom: 0.5rem;"><strong>1.1.</strong> O cliente declara estar ciente e concorda que 50% (cinquenta por cento) do valor total do serviço deverá ser pago antecipadamente, no ato da abertura da presente Ordem de Serviço.</p>
                                <p style="margin-bottom: 0.5rem;"><strong>1.2.</strong> O valor pago a título de sinal não é reembolsável em caso de desistência do serviço por parte do cliente após o início dos trabalhos.</p>
                                <p style="margin-bottom: 1rem;"><strong>1.3.</strong> O saldo remanescente deverá ser quitado integralmente no ato da retirada do aparelho.</p>
                                
                                <h4 style="color: #ff8c00; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 1rem;">2. DO ESTADO DO APARELHO</h4>
                                <p style="margin-bottom: 0.5rem;"><strong>2.1.</strong> O cliente declara que entregou o aparelho para análise e/ou reparo ciente de seu estado físico e funcional, incluindo possíveis danos pré-existentes como: Trincas, riscos, amassados; Manchas na tela; Oxidação, umidade ou contato com líquidos; Falhas intermitentes ou ocultas.</p>
                                <p style="margin-bottom: 0.5rem;"><strong>2.2.</strong> A assistência não se responsabiliza por falhas preexistentes que venham a se manifestar durante ou após o reparo.</p>
                                <p style="margin-bottom: 1rem;"><strong>2.3.</strong> Em aparelhos que já apresentem sinais de oxidação, queda ou tentativas anteriores de conserto, não há garantia de recuperação total do funcionamento, mesmo após o serviço executado.</p>
                                
                                <h4 style="color: #ff8c00; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 1rem;">3. DA GARANTIA DO SERVIÇO</h4>
                                <p style="margin-bottom: 0.5rem;"><strong>3.1.</strong> A garantia refere-se exclusivamente ao serviço executado ou à peça substituída, pelo prazo de 90 dias.</p>
                                <p style="margin-bottom: 0.5rem;"><strong>3.2.</strong> A garantia não cobre: Danos causados por mau uso; Quedas, impactos, líquidos ou sobrecarga elétrica; Atualizações de sistema, vírus ou softwares de terceiros; Defeitos não relacionados diretamente ao serviço realizado.</p>
                                <p style="margin-bottom: 1rem;"><strong>3.3.</strong> Qualquer violação de lacres, abertura do aparelho por terceiros ou nova queda anula automaticamente a garantia.</p>
                                
                                <h4 style="color: #ff8c00; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 1rem;">4. DA RESPONSABILIDADE SOBRE DADOS</h4>
                                <p style="margin-bottom: 0.5rem;"><strong>4.1.</strong> A assistência não se responsabiliza por perda de dados, como fotos, contatos, aplicativos ou arquivos.</p>
                                <p style="margin-bottom: 1rem;"><strong>4.2.</strong> É de inteira responsabilidade do cliente realizar backup prévio antes da entrega do aparelho.</p>
                                
                                <h4 style="color: #ff8c00; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 1rem;">5. DO NÃO FUNCIONAMENTO APÓS O REPARO</h4>
                                <p style="margin-bottom: 0.5rem;"><strong>5.1.</strong> O cliente reconhece que, em alguns casos, o aparelho pode não apresentar recuperação total, devido ao grau de dano, oxidação, desgaste de componentes ou defeitos ocultos.</p>
                                <p style="margin-bottom: 1rem;"><strong>5.2.</strong> Nesses casos, o valor referente à análise técnica não será devolvido, bem como o sinal pago.</p>
                                
                                <h4 style="color: #ff8c00; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 1rem;">6. DO ABANDONO DO APARELHO (CLÁUSULA CRÍTICA)</h4>
                                <p style="margin-bottom: 0.5rem;"><strong>6.1.</strong> Após a conclusão do serviço ou comunicação de impossibilidade de reparo, o cliente terá o prazo máximo de 90 (noventa) dias corridos para retirar o aparelho.</p>
                                <p style="margin-bottom: 0.5rem;"><strong>6.2.</strong> Após esse prazo, será cobrada taxa de armazenamento no valor de R$ 5,00 (cinco reais) por dia.</p>
                                <p style="margin-bottom: 1rem;"><strong>6.3.</strong> Caso o aparelho permaneça abandonado por período superior a 180 dias, a assistência poderá: Destinar o aparelho para descarte; Utilizá-lo para compensação de custos; Ou dar outra destinação legalmente permitida, sem direito a qualquer indenização ao cliente.</p>
                                
                                <h4 style="color: #ff8c00; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 1rem;">7. DA CIÊNCIA E ACEITE</h4>
                                <p style="margin-bottom: 0.5rem;"><strong>7.1.</strong> Ao assinar a presente Ordem de Serviço, o cliente declara que leu, compreendeu e concorda integralmente com todas as cláusulas aqui descritas, não cabendo alegação futura de desconhecimento.</p>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Assinatura do orçamento
            if (repair.budget && typeof repair.budget === 'object' && repair.budget.status === 'approved') {
                const hasSignature = repair.signature && repair.signature.image;
                if (hasSignature) {
                    html += `
                        <div class="repair-card" style="background: rgba(40, 167, 69, 0.1); border-color: #28a745;">
                            <h3 style="color: #28a745; margin-bottom: 1rem;">✍️ Assinatura Digital</h3>
                            <div style="background: rgba(40, 167, 69, 0.1); border: 2px solid #28a745; border-radius: 10px; padding: 1rem; margin-bottom: 1rem;">
                                <p style="color: #28a745; margin-bottom: 0.5rem; font-weight: bold;">✅ Assinatura realizada em ${repair.signature.signed_at ? repair.signature.signed_at.substring(0, 16) : 'N/A'}</p>
                            </div>
                            <img src="${repair.signature.image}" alt="Assinatura" style="max-width: 100%; border: 2px solid #28a745; border-radius: 10px; padding: 1rem; background: #ffffff;" onerror="this.style.display='none';">
                        </div>
                    `;
                } else {
                    html += `
                        <div class="repair-card" style="background: rgba(255, 140, 0, 0.1); border-color: #ff8c00;">
                            <h3 style="color: #ff8c00; margin-bottom: 1rem;">✍️ Assinatura Digital</h3>
                            <p style="color: #cccccc; margin-bottom: 1rem;">Assine digitalmente para confirmar a aprovação do orçamento e autorizar o reparo.</p>
                            <div style="background: rgba(255, 193, 7, 0.1); border: 1px solid #ffc107; border-radius: 10px; padding: 0.75rem; margin-bottom: 1rem;">
                                <p style="color: #ffc107; margin: 0;">⏳ Aguardando assinatura</p>
                            </div>
                            <canvas id="signature-canvas-${repair.id}" style="width: 100%; height: 200px; border: 2px solid #333333; border-radius: 10px; background: #ffffff; cursor: crosshair; touch-action: none; margin-bottom: 0.75rem;"></canvas>
                            <input type="hidden" id="signature-data-${repair.id}">
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn btn-secondary" onclick="clearSignature('${repair.id}')" style="flex: 1; background: #6c757d;">🗑️ Limpar</button>
                                <button class="btn" onclick="saveSignature('${repair.id}', this)" style="flex: 1; background: #28a745;">✅ Confirmar Assinatura</button>
                            </div>
                        </div>
                    `;
                }
            }
            
            // Histórico
            if (repair.history && repair.history.length > 0) {
                html += `
                    <div class="repair-card">
                        <h3 style="color: #ff8c00; margin-bottom: 1rem;">📋 Histórico</h3>
                        ${repair.history.map(item => `
                            <div style="display: flex; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid #333333;">
                                <div style="color: #999; font-size: 0.85rem; min-width: 120px;">
                                    ${item.timestamp ? item.timestamp.substring(0, 16) : 'N/A'}
                                </div>
                                <div style="color: #fff; flex: 1;">${item.action || ''}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            container.innerHTML = html;
            
            // Inicializar canvas de assinaturas após renderizar
            setTimeout(() => {
                initSignatureCanvases();
            }, 100);
        }
        
        // Enviar mensagem
        async function sendMessage(repairId) {
            const messageInput = document.getElementById('newMessage');
            const message = messageInput.value.trim();
            
            if (!message) {
                alert('Por favor, digite uma mensagem');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/repair/${repairId}/message`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        cpf: localStorage.getItem('userCpf'),
                        message: message
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageInput.value = '';
                    refreshRepairDetails(repairId);
                } else {
                    alert(data.error || 'Erro ao enviar mensagem');
                }
            } catch (error) {
                alert('Erro ao enviar mensagem. Tente novamente.');
            }
        }
        
        // Aprovar/Rejeitar orçamento
        async function approveBudget(repairId) {
            if (!confirm('Confirmar aprovação do orçamento?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/repair/${repairId}/budget/approve`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cpf: localStorage.getItem('userCpf')})
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('Orçamento aprovado!');
                    refreshRepairDetails(repairId);
                } else {
                    alert(data.error || 'Erro ao aprovar orçamento');
                }
            } catch (error) {
                alert('Erro ao aprovar orçamento');
            }
        }
        
        async function rejectBudget(repairId) {
            if (!confirm('Confirmar rejeição do orçamento? O reparo será cancelado.')) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/repair/${repairId}/budget/reject`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cpf: localStorage.getItem('userCpf')})
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('Orçamento rejeitado.');
                    refreshRepairDetails(repairId);
                } else {
                    alert(data.error || 'Erro ao rejeitar orçamento');
                }
            } catch (error) {
                alert('Erro ao rejeitar orçamento');
            }
        }
        
        // Download PDF
        function downloadPDF(repairId, type) {
            if (type === 'or') {
                window.open(`${API_BASE}/status/${repairId}/or/pdf`, '_blank');
            } else {
                window.open(`${API_BASE}/status/${repairId}/pdf`, '_blank');
            }
        }
        
        // Atualizar detalhes do reparo
        async function refreshRepairDetails(repairId) {
            await viewRepairDetails(repairId);
        }
        
        // Polling para atualização em tempo real
        let repairPollingInterval = null;
        function startRepairPolling(repairId) {
            if (repairPollingInterval) {
                clearInterval(repairPollingInterval);
            }
            repairPollingInterval = setInterval(async () => {
                const cpf = localStorage.getItem('userCpf');
                if (!cpf) {
                    clearInterval(repairPollingInterval);
                    return;
                }
                
                try {
                    const response = await fetch(`${API_BASE}/api/repair/${repairId}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({cpf})
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        // Verificar se houve mudanças (comparar timestamps)
                        const currentRepair = data.repair;
                        // Atualizar apenas se necessário (evitar flicker)
                        const currentContent = document.getElementById('repairDetailsContent').innerHTML;
                        if (currentContent && !currentContent.includes('Carregando...')) {
                            displayRepairDetails(currentRepair, data.order, data.checklists);
                        }
                    }
                } catch (error) {
                    console.error('Erro no polling:', error);
                }
            }, 10000); // Atualizar a cada 10 segundos
        }
        
        function stopRepairPolling() {
            if (repairPollingInterval) {
                clearInterval(repairPollingInterval);
                repairPollingInterval = null;
            }
        }
        
        function getStatusLabel(status) {
            const labels = {
                'aguardando': 'Aguardando',
                'em_andamento': 'Em Andamento',
                'concluido': 'Concluído'
            };
            return labels[status] || status;
        }
        

        
        // Logout
        function logout() {
            localStorage.removeItem('userToken');
            localStorage.removeItem('userCpf');
            showHome();
        }
        
        // Helpers
        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.remove('hidden');
        }
        
        function showSuccess(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.remove('hidden');
        }
        
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const registration = await navigator.serviceWorker.register('/mobile_app/service-worker.js', {
                        scope: '/mobile_app/'
                    });
                    console.log('Service Worker registrado:', registration);
                } catch (error) {
                    console.error('Erro ao registrar Service Worker:', error);
                }
            });
        }
        
        // Solicitar permissão e registrar notificações push (usando polling)
        async function registerPushNotifications() {
            if ('serviceWorker' in navigator) {
                try {
                    // Registrar service worker
                    const registration = await navigator.serviceWorker.register('/mobile_app/service-worker.js', {
                        scope: '/mobile_app/'
                    });
                    console.log('Service Worker registrado:', registration);
                    
                    // Solicitar permissão de notificação
                    if ('Notification' in window) {
                        const permission = await Notification.requestPermission();
                        if (permission === 'granted') {
                            console.log('Permissão de notificação concedida');
                            
                            // Registrar subscription simples (apenas para tracking)
                            const cpf = localStorage.getItem('userCpf');
                            if (cpf) {
                                try {
                                    await fetch(`${API_BASE}/api/register-push-token`, {
                                        method: 'POST',
                                        headers: {'Content-Type': 'application/json'},
                                        body: JSON.stringify({
                                            cpf: cpf,
                                            subscription: {
                                                endpoint: 'polling',
                                                keys: null
                                            },
                                            device_info: {
                                                userAgent: navigator.userAgent,
                                                platform: navigator.platform
                                            }
                                        })
                                    });
                                    console.log('Subscription registrada com sucesso');
                                } catch (error) {
                                    console.error('Erro ao registrar subscription:', error);
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.error('Erro ao registrar notificações push:', error);
                }
            }
        }
        
        // Solicitar verificação imediata de notificações ao service worker
        async function triggerNotificationCheck() {
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.ready;
                    if (registration.active) {
                        registration.active.postMessage({
                            type: 'CHECK_NOW'
                        });
                    }
                } catch (error) {
                    console.error('Erro ao solicitar verificação de notificações:', error);
                }
            }
        }
        
        window.addEventListener('load', async () => {
            if (localStorage.getItem('userToken') && localStorage.getItem('userCpf')) {
                loadRepairs();
                await registerPushNotifications();
                triggerNotificationCheck();
            }
        });
        
        async function handleLoginSuccess(cpf) {
            await registerPushNotifications();
            triggerNotificationCheck();
        }
        
        // Máscara de CPF
        document.querySelectorAll('input[type="text"][id*="Cpf"]').forEach(input => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/\D/g, '');
            });
        });
        
 
        
        // Verificar hash na URL para mostrar tela específica
        window.addEventListener('load', () => {
            if (window.location.hash) {
                const hash = window.location.hash.substring(1); // Remove o #

                    showLogin();
                } else if (hash === 'firstAccessScreen') {
                    showFirstAccess();
                }
            }
        });
        
        // Listener para mudanças no hash
        window.addEventListener('hashchange', () => {
            if (window.location.hash) {
                const hash = window.location.hash.substring(1);

                    showLogin();
                } else if (hash === 'firstAccessScreen') {
                    showFirstAccess();
                }
            }
        });
    </script>
    
    
</body>
</html>
